<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <h2>Tic-Tac-Toe</h2>

  <div id="board-wrapper">
    <p><b>Current player:</b></p>
    <img id="current-player-img" src="" alt="Current player symbol" height="60" />

    <!-- 3x3 game board -->
    <table id="board">
      <tr>
        <td id="a11" class="cell" data-jogo=""></td>
        <td id="a12" class="cell" data-jogo=""></td>
        <td id="a13" class="cell" data-jogo=""></td>
      </tr>
      <tr>
        <td id="b21" class="cell" data-jogo=""></td>
        <td id="b22" class="cell" data-jogo=""></td>
        <td id="b23" class="cell" data-jogo=""></td>
      </tr>
      <tr>
        <td id="c31" class="cell" data-jogo=""></td>
        <td id="c32" class="cell" data-jogo=""></td>
        <td id="c33" class="cell" data-jogo=""></td>
      </tr>
    </table>

    <button id="restart-btn" onclick="restartGame()">Restart</button>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
